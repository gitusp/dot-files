set-hook -g after-new-window      'if -F "#{==:#{session_windows},1}" "set status off" "set status on"'
set-hook -g window-unlinked        'if -F "#{==:#{session_windows},1}" "set status off" "set status on"'
set-hook -g session-window-changed 'if -F "#{==:#{session_windows},1}" "set status off" "set status on"'
set -g status off

set -g prefix C-q
unbind C-b

set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB:extkeys'
set -s extended-keys on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

bind-key c new-window -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

set -g destroy-unattached on
unbind d

