# これらの割り当てについては普遍性が低いように感じる。
# こういった例外があることで、本来なかったはずの例外を無駄に想起してしまい、
# 結局総合的には負荷が上がってしまうのではないかと思った。
# 
# 以下にパッと思い付く限りで別パターンを考えてみた。
# これらが頭に浮ぶ度に、そっちではないよなと考えるコストがある気がしており、
# 合理的とは思えなかった。
#
# kt,こと → きた
# wt,わた
